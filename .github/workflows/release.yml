name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v0.2.0"
        required: true
        type: string
      target:
        description: "Branch or commit SHA the tag should point at"
        required: false
        default: "main"
        type: string
      notes:
        description: "Release notes (Markdown). Empty auto-generates from PRs."
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          TARGET: ${{ inputs.target }}
          NOTES: ${{ inputs.notes }}
        run: |
          if [ -n "$NOTES" ]; then
            printf '%s\n' "$NOTES" > /tmp/notes.md
            gh release create "$TAG" --target "$TARGET" --title "$TAG" --notes-file /tmp/notes.md
          else
            gh release create "$TAG" --target "$TARGET" --title "$TAG" --generate-notes
          fi
