name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v0.3.0"
        required: true
        type: string
      target:
        description: "Branch or commit SHA to verify and release"
        required: false
        default: "main"
        type: string
      notes:
        description: "Release notes (Markdown). Empty auto-generates from PRs."
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - name: Validate release version and target
        env:
          TAG: ${{ inputs.tag }}
        run: |
          VERSION=$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          PACKAGE_VERSION=$(uv run python -c 'from linuxdo_reader import __version__; print(__version__)')
          test "$VERSION" = "$PACKAGE_VERSION"
          test "$TAG" = "v$VERSION"
          echo "RELEASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - name: Lint
        run: uv run ruff check .
      - name: Test in isolated environment
        run: PYTHONWARNINGS='error::ResourceWarning' uv run --isolated --with-editable . --with pytest --with respx pytest -q
      - name: Security scan
        run: |
          uv run bandit -q -r src
          uv run pip-audit
      - name: Build distributions
        run: |
          uv build
          tar -tzf dist/*.tar.gz > /tmp/sdist-files.txt
          grep -q '/skills/linuxdo-reader/SKILL.md$' /tmp/sdist-files.txt
      - name: Create GitHub release from verified SHA
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          NOTES: ${{ inputs.notes }}
        run: |
          if [ -n "$NOTES" ]; then
            printf '%s\n' "$NOTES" > /tmp/notes.md
            gh release create "$TAG" --target "$RELEASE_SHA" --title "$TAG" --notes-file /tmp/notes.md
          else
            gh release create "$TAG" --target "$RELEASE_SHA" --title "$TAG" --generate-notes
          fi
